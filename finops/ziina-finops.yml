description: >-
  FinOps view of Ziina spend. Unlike metered infrastructure APIs, Ziina charges
  no fee for API calls themselves - cost is a per-transaction acquiring fee on
  collected payments (percentage + fixed AED, plus a surcharge on international
  cards / non-AED currencies), with 5% UAE VAT applied to the fee. Transfers
  between Ziina Business accounts are free. Spend therefore scales with payment
  volume and payment mix (domestic vs international, AED vs FX), not with request
  count.
notes: >-
  Fee percentages change; verify against https://ziina.com/fees during
  reconciliation. Non-AED payments settle in AED at real-time FX, so FX movement
  is an additional cost/variance dimension.
