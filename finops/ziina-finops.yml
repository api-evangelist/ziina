meters:
- name: payment_transaction_fee
  description: Percentage-plus-fixed acquiring fee on each collected payment intent.
  unit: transaction
  aggregation: sum
  dimensions:
  - account
  - payment_method
  - currency
- name: international_surcharge
  description: Additional 1.5% on international cards or non-AED currency payments.
  unit: transaction
  aggregation: sum
  dimensions:
  - account
  - currency
  - card_origin
- name: vat
  description: 5% UAE VAT applied to the Ziina fee (not to transaction volume).
  unit: currency
  aggregation: sum
  dimensions:
  - account
- name: fx_conversion
  description: Real-time conversion of non-AED payments to AED at settlement.
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - currency
principles:
- name: Visibility
  description: Track fees per payment method and per currency; separate the 1.5% international surcharge and VAT lines.
- name: Allocation
  description: Tag payment intents (via success/cancel URLs and operation_id) to map revenue and fees to products/teams.
- name: Optimization
  description: Prefer domestic AED card and Apple/Google Pay flows to avoid the international surcharge; use free Ziina-to-Ziina transfers for payouts where possible.
- name: Accountability
  description: Reconcile Ziina fee + VAT against gross payment volume monthly; monitor FX variance on non-AED settlement.
