notes: >-
  Ziina does not use RFC 9457 application/problem+json. Errors are returned in a
  simple { message, code } envelope (ErrorDto). The OpenAPI does not enumerate
  per-status responses (operations declare a single `default` response), so a
  granular problem-type registry cannot be derived. The processing errors that
  can attach to a payment intent or refund are represented by the ErrorDto shape
  above. The docs publish no standalone error-code reference table.
