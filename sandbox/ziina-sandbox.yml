test_mode:
  mechanism: request-flag
  field: test
  location: request body (CreatePaymentIntentDto.test, InitiateRefundDto.test)
  description: >-
    There is no separate sandbox host or test API key. Pass `test: true` in the
    Create Payment Intent (or Create Refund) request body to create a test
    payment. Test payments do not require a real payment method and you are not
    charged. Test cards work only in test mode and are declined in production.
  behavior: >-
    In test mode you can complete a payment intent with any card number, any
    future expiry date, and any valid CVV format for the card type. The documented
    test cards below are provided for convenience.
